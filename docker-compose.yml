version: '3.9'

services:
  redis:
    image: redis:7.2-alpine
    container_name: meeting-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - meeting-network
  postgres:
    image: postgres:16
    container_name: meeting-postgres
    environment:
      POSTGRES_DB: meetingplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: meeting-keycloak
    command: start-dev
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/meetingplatform
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: 123456
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - postgres