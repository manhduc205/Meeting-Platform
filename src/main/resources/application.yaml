server:
  port: 8081

spring:
  application:
    name: meetingplatform

  datasource:
    url: jdbc:postgresql://localhost:5432/meetingplatform
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/meeting-realm
          jwk-set-uri: http://localhost:8080/realms/meeting-realm/protocol/openid-connect/certs